<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>철원 전사 - 강철 오운완 기록기 v2</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #4caf50;
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
            --danger-color: #e57373;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 480px;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            color: var(--accent-color);
            margin: 0;
            font-size: 24px;
        }

        /* 타이머 스타일 */
        .timer-card {
            background-color: var(--card-bg);
            border: 2px solid var(--accent-color);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            margin-bottom: 20px;
            position: sticky;
            top: 10px;
            z-index: 10;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .timer-display {
            font-size: 3rem;
            font-weight: bold;
            margin: 5px 0;
            font-variant-numeric: tabular-nums;
        }

        /* 운동 추가 세션 */
        .add-workout-card {
            background-color: #252525;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px dashed var(--accent-color);
        }

        .add-input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            background: #121212;
            border: 1px solid #444;
            color: white;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .add-btn {
            width: 100%;
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        /* 운동 카드 스타일 */
        .workout-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            position: relative;
        }

        .workout-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .workout-title {
            font-size: 18px;
            font-weight: bold;
        }

        .delete-workout-btn {
            background: none;
            border: none;
            color: var(--danger-color);
            cursor: pointer;
            font-size: 14px;
        }

        /* 원터치 조절 UI */
        .input-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .control-label {
            width: 60px;
            font-weight: bold;
            color: var(--text-muted);
        }

        .counter-btn {
            background-color: #333;
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }

        .counter-btn:active {
            background-color: var(--accent-color);
        }

        .value-display {
            font-size: 18px;
            font-weight: bold;
            width: 90px;
            text-align: center;
        }

        .log-btn {
            width: 100%;
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        /* 세트 수정 가능한 로그 영역 */
        .log-history {
            margin-top: 15px;
            background: #151515;
            padding: 10px;
            border-radius: 8px;
        }

        .log-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid #222;
        }

        .log-entry:last-child {
            border-bottom: none;
        }

        .log-edit-inputs {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .edit-input {
            width: 45px;
            background: #222;
            border: 1px solid #444;
            color: white;
            text-align: center;
            padding: 4px;
            border-radius: 4px;
            font-size: 14px;
        }

        .remove-set-btn {
            background: none;
            border: none;
            color: var(--danger-color);
            cursor: pointer;
            font-weight: bold;
            margin-left: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>⚡ 강철 오운완 기록기 v2</h1>
        <p style="color: var(--text-muted); margin: 5px 0 0 0;">점진적 과부하 무한 동력</p>
    </header>

    <div class="timer-card">
        <div style="font-size: 14px; color: var(--text-muted);">스마트 휴식 타이머</div>
        <div class="timer-display" id="timerDisplay">00:00</div>
        <div style="color: var(--accent-color); font-size: 13px; font-weight: bold;" id="timerStatus">대기 중</div>
    </div>

    <div class="add-workout-card">
        <div style="font-weight: bold; margin-bottom: 10px; color: var(--accent-color);">＋ 새로운 운동 추가</div>
        <input type="text" id="newWorkoutName" class="add-input" placeholder="예: 벤치프레스, 데드리프트">
        <input type="number" id="newWorkoutRest" class="add-input" placeholder="휴식 시간 설정 (초 단위, 예: 60, 240)" value="60">
        <button class="add-btn" onclick="addNewWorkout()">루틴에 운동 추가</button>
    </div>

    <div id="workoutContainer"></div>
</div>

<script>
    // 전역 타이머 관리 변수
    let timerInterval = null;

    // 초기 기본 데이터 (형님 기본 루틴 자동 세팅)
    let workouts = [
        { id: 'w1', name: '백 스쿼트', weight: 90, reps: 5, rest: 240, logs: [] },
        { id: 'w2', name: '사이드 레터럴 레이즈', weight: 4, reps: 20, rest: 60, logs: [] }
    ];

    // 앱 시작 시 화면 그리기
    renderWorkouts();

    // 1. 운동 추가 기능
    function addNewWorkout() {
        const nameInput = document.getElementById('newWorkoutName');
        const restInput = document.getElementById('newWorkoutRest');
        
        if (!nameInput.value.trim()) {
            alert('운동 이름을 입력하십시오!');
            return;
        }

        const newId = 'w_' + Date.now();
        workouts.push({
            id: newId,
            name: nameInput.value.trim(),
            weight: 60, // 기본 초깃값
            reps: 10,
            rest: parseInt(restInput.value) || 60,
            logs: []
        });

        nameInput.value = '';
        renderWorkouts();
    }

    // 2. 운동 삭제 기능
    function deleteWorkout(id) {
        if(confirm("이 운동을 루틴에서 완전히 삭제하시겠습니까?")) {
            workouts = workouts.filter(w => w.id !== id);
            renderWorkouts();
        }
    }

    // 3. 화면 UI 렌더링 함수
    function renderWorkouts() {
        const container = document.getElementById('workoutContainer');
        container.innerHTML = '';

        workouts.forEach(w => {
            const card = document.createElement('div');
            card.className = 'workout-card';
            
            // 분 단위 가독성 계산
            const restMin = Math.floor(w.rest / 60);
            const restSec = w.rest % 60;
            const restText = restSec > 0 ? `${restMin}분 ${restSec}초` : `${restMin}분`;

            let logHtml = '';
            w.logs.forEach((log, index) => {
                logHtml += `
                    <div class="log-entry">
                        <span>[${index + 1}세트]</span>
                        <div class="log-edit-inputs">
                            <input type="number" class="edit-input" value="${log.weight}" onchange="updateLog('${w.id}', ${index}, 'weight', this.value)"> kg x 
                            <input type="number" class="edit-input" value="${log.reps}" onchange="updateLog('${w.id}', ${index}, 'reps', this.value)"> 회
                            <button class="remove-set-btn" onclick="deleteLog('${w.id}', ${index})">×</button>
                        </div>
                    </div>
                `;
            });

            card.innerHTML = `
                <div class="workout-header">
                    <div class="workout-title">${w.name}</div>
                    <div>
