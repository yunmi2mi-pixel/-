<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강철 오운완 기록기 v3 (달력 내장형)</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #4caf50;
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
            --danger-color: #e57373;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 480px;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            color: var(--accent-color);
            margin: 0;
            font-size: 22px;
        }

        /* 타이머 스타일 */
        .timer-card {
            background-color: var(--card-bg);
            border: 2px solid var(--accent-color);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            margin-bottom: 20px;
            position: sticky;
            top: 10px;
            z-index: 10;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .timer-display {
            font-size: 2.5rem;
            font-weight: bold;
            margin: 5px 0;
            font-variant-numeric: tabular-nums;
        }

        /* 📅 달력 섹션 스타일 */
        .calendar-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            text-align: center;
        }

        .calendar-day-label {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: bold;
            padding-bottom: 5px;
        }

        .calendar-day {
            background: #252525;
            padding: 8px 0;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            border: 1px solid transparent;
            position: relative;
        }

        .calendar-day:active {
            background: #333;
        }

        .calendar-day.selected {
            border: 1px solid var(--accent-color);
            background: #1b3a1b;
        }

        .calendar-day.has-log::after {
            content: '';
            position: absolute;
            bottom: 3px;
            left: 50%;
            transform: translateX(-50%);
            width: 5px;
            height: 5px;
            background-color: var(--accent-color);
            border-radius: 50%;
        }

        /* 분할 루틴 탭 스타일 */
        .routine-tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
        }

        .tab-btn {
            flex: 1;
            background-color: #252525;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        .tab-btn.active {
            background-color: var(--accent-color);
        }

        /* 운동 카드 스타일 */
        .workout-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .workout-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .workout-title {
            font-size: 16px;
            font-weight: bold;
        }

        /* 원터치 조절 UI */
        .input-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .control-label {
            width: 50px;
            font-weight: bold;
            color: var(--text-muted);
        }

        .counter-btn {
            background-color: #333;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .value-display {
            font-size: 18px;
            font-weight: bold;
            width: 80px;
            text-align: center;
        }

        .log-btn {
            width: 100%;
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        /* 히스토리 및 조말 팝업 스타일 */
        .history-section {
            background-color: #1a1a1a;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid #333;
        }

        .log-entry {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #252525;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>⚡ 강철 오운완 시스템 v3</h1>
        <p style="color: var(--text-muted); margin: 5px 0 0 0;">3분할 루틴 & 히스토리 달력</p>
    </header>

    <div class="timer-card">
        <div class="timer-display" id="timerDisplay">00:00</div>
        <div style="color: var(--accent-color); font-size: 12px; font-weight: bold;" id="timerStatus">대기 중</div>
    </div>

    <div class="calendar-card">
        <div class="calendar-header">
            <span id="calendarMonthYear"></span>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <div class="history-section">
        <div style="font-weight: bold; color: var(--accent-color); margin-bottom: 10px;" id="historyTitle">오늘의 기록</div>
        <div id="historyContent" style="color: var(--text-muted); font-size: 14px;">선택한 날짜에 기록된 운동이 없습니다.</div>
    </div>

    <div class="routine-tabs">
        <button class="tab-btn active" onclick="switchRoutine('push', this)">1일차: PUSH</button>
        <button class="tab-btn" onclick="switchRoutine('pull', this)">2일차: PULL</button>
        <button class="tab-btn" onclick="switchRoutine('leg', this)">3일차: LEG/코어</button>
    </div>

    <div id="workoutContainer"></div>
</div>

<script>
    let timerInterval = null;
    let currentRoutine = 'push';
    
    // 날짜별 기록을 저장할 객체 (날짜 문자열을 키로 사용, 예: '2026-05-17')
    // 브라우저를 껐다 켜도 유지되도록 로컬 스토리지 연동
    let database = JSON.parse(localStorage.getItem('workout_db')) || {};
    
    // 오늘 날짜 구하기 (YYYY-MM-DD 형식)
    const todayStr = getFormattedDate(new Date());
    let selectedDateStr = todayStr; // 기본 선택은 오늘

    // 3대 운동 및 형님 루틴 12종목 3분할 데이터 구성
    const routineData = {
        push: [
            { id: 'p1', name: '2. 벤치프레스 (Bench Press)', weight: 60, reps: 7, rest: 180, weightUnit: 5 },
            { id: 'p2', name: '5. 밀리터리 프레스 (OHP)', weight: 40, reps: 6, rest: 120, weightUnit: 5 },
            { id: 'p3', name: '4. 인클라인 덤벨 프레스', weight: 15, reps: 15, rest: 120, weightUnit: 1 },
            { id: 'p4', name: '6. 사이드 레터럴 레이즈', weight: 4, reps: 20, rest: 60, weightUnit: 1 },
            { id: 'p5', name: '7. 덤벨 펙덱플라이', weight: 8, reps: 15, rest: 60, weightUnit: 1 }
        ],
        pull: [
            { id: 'l1', name: '3. 데드리프트 (Deadlift)', weight: 120, reps: 5, rest: 240, weightUnit: 5 },
            { id: 'l2', name: '8. 턱걸이 (Pull-ups)', weight: 0, reps: 5, rest: 120, weightUnit: 1 },
            { id: 'l3', name: '9. 바벨 로우', weight: 50, reps: 8, rest: 120, weightUnit: 5 }
        ],
        leg: [
            { id: 'g1', name: '1. 백 스쿼트 (Back Squat)', weight: 90, reps: 5, rest: 240, weightUnit: 5 },
            { id: 'g2', name: '12. 런지 (Lunge)', weight: 0, reps: 12, rest: 90, weightUnit: 1 },
            { id: 'g3', name: '10. 행잉 레그레이즈', weight: 0, reps: 15, rest: 60, weightUnit: 1 },
            { id: 'g4', name: '11. 크런치', weight: 0, reps: 20, rest: 60, weightUnit: 1 }
        ]
    };

    // 초기 구동
    initCalendar();
    renderWorkouts();
    showHistoryAt(todayStr);

    // YYYY-MM-DD 변환 함수
    function getFormattedDate(date) {
        const yyyy = date.getFullYear();
        const mm = String(date.getMonth() + 1).padStart(2, '0');
        const dd = String(date.getDate()).padStart(2, '0');
        return `${yyyy}-${mm}-${dd}`;
    }

    // 📅 달력 생성 시스템
    function initCalendar() {
        const now = new Date();
        document.getElementById('calendarMonthYear').innerText = `${now.getFullYear()}년 ${now.getMonth() + 1}월`;
        
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';

        // 요일 라벨 깔기
        const days = ['일', '월', '화', '수', '목', '금', '토'];
        days.forEach(d => {
            const label = document.createElement('div');
            label.className = 'calendar-day-label';
            label.innerText = d;
            grid.appendChild(label);
        });

        // 이번 달 날짜 채우기 (현재 날짜 기준 전후 일주일 가독성 집중용 단순화 버전)
        const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
        const endOfMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0);
        
        // 공백 맞추기
        for(let i=0; i<startOfMonth.getDay(); i++) {
            grid.appendChild(document.createElement('div'));
        }

        // 날짜 뿌리기
        for(let d=1; d<=endOfMonth.getDate(); d++) {
            const dayBox = document.createElement('div');
            dayBox.className = 'calendar-day';
            dayBox.innerText = d;
            
            const targetDateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            
            // 데이터가 있는 날 표시 점 추가
            if (database[targetDateStr] && database[targetDateStr].length > 0) {
                dayBox.classList.add('has-log');
            }

            // 오늘 날짜 및 선택 표시
            if (targetDateStr === selectedDateStr) {
                dayBox.classList.add('selected');
            }

            dayBox.onclick = () => {
                document.querySelectorAll('.calendar-day').forEach(el => el.classList.remove('selected'));
                dayBox.classList.add('selected');
                selectedDateStr = targetDateStr;
                showHistoryAt(targetDateStr);
            };

            grid.appendChild(dayBox);
        }
    }

    // 탭 전환 기능
    function switchRoutine(routineType, btnElement) {
        currentRoutine = routineType;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btnElement.classList.add('active');
        renderWorkouts();
    }

    // 운동 카드 생성 렌더러
    function renderWorkouts() {
        const container = document.getElementById('workoutContainer');
        container.innerHTML = '';

        routineData[currentRoutine].forEach(w => {
            const card = document.createElement('div');
            card.className = 'workout-card';
            
            const restText = w.rest >= 60 ? `${Math.floor(w.rest/60)}분` : `${w.rest}초`;

            card.innerHTML = `
                <div class="workout-header">
                    <div class="workout-title">${w.name}</div>
                    <span class="rest-tag" style="background:#333; color:var(--accent-color); padding:3px 6px; border-radius:4px; font-size:12px;">휴식: ${restText}</span>
                </div>
                
                <div class="input-group">
                    <div class="control-label">무게</div>
                    <button class="counter-btn" onclick="adjustValue('${w.id}', 'weight', -${w.weightUnit})">-${w.weightUnit}</button>
                    <div class="value-display" id="${w.id}-weight">${w.weight} kg</div>
                    <button class="counter-btn" onclick="adjustValue('${w.id}', 'weight', ${w.weightUnit})">+${w.weightUnit}</button>
                </div>

                <div class="input-group">
                    <div class="control-label">횟수</div>
                    <button class="counter-btn" onclick="adjustValue('${w.id}', 'reps', -1)">-1</button>
                    <div class="value-display" id="${w.id}-reps">${w.reps} 회</div>
                    <button class="counter-btn" onclick="adjustValue('${w.id}', 'reps', 1)">+1</button>
                </div>

                <button class="log-btn" onclick="logSet('${w.id}', '${w.name}', ${w.rest})">세트 완료</button>
            `;
            container.appendChild(card);
        });
    }

    // 수치 조절기
    function adjustValue(id, key, amount) {
        const item = routineData[currentRoutine].find(w => w.id === id);
        item[key] += amount;
        if(item[key] < 0) item[key] = 0;
        document.getElementById(`${id}-${key}`).innerText = item[key] + (key === 'weight' ? ' kg' : ' 회');
    }

    // 세트 완료 시 데이터 베이스 저장 및 타이머 작동
    function logSet(id, name, restSeconds) {
        const item = routineData[currentRoutine].find(w => w.id === id);
        
        if (!database[selectedDateStr]) {
            database[selectedDateStr] = [];
        }

        // 해당 날짜에 세트 데이터 누적
        database[selectedDateStr].push({
            name: name,
            weight: item.weight,
            reps: item.reps,
            time: new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' })
        });

        // 로컬 저장소에 세이브
        localStorage.setItem('workout_db', JSON.stringify(database));
        
        // UI 갱신
        initCalendar();
        showHistoryAt(selectedDateStr);
        startTimer(restSeconds);
    }

    // 특정 날짜의 히스토리 내역을 화면에 뿌려주는 함수
    function showHistoryAt(dateStr) {
        document.getElementById('historyTitle').innerText = `📅 ${dateStr}의 기록`;
        const content = document.getElementById('historyContent');
        content.innerHTML = '';

        if (!database[dateStr] || database[dateStr].length === 0) {
            content.innerText = '이 날 기록된 운동이 없습니다. 바벨을 드십시오!';
            return;
        }

        database[dateStr].forEach((log, idx) => {
            const row = document.createElement('div');
            row.className = 'log-entry';
            row.innerHTML = `
                <span>${log.name}</span>
                <span style="color:var(--accent-color); font-weight:bold;">${log.weight}kg x ${log.reps}회 <small style="color:#666; font-weight:normal;">(${log.time})</small></span>
            `;
            content.appendChild(row);
        });
    }

    // 타이머 구동 시스템
    function startTimer(seconds) {
        clearInterval(timerInterval);
        let timeLeft = seconds;
        const display = document.getElementById('timerDisplay');
        const status = document.getElementById('timerStatus');
        
        status.innerText = "🔥 근육 회복 중... 강해지는 시간! 🔥";
        status.style.color = "#ff9800";

        timerInterval = setInterval(() => {
            timeLeft--;
            const mins = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const secs = (timeLeft % 60).toString().padStart(2, '0');
            display.innerText = `${mins}:${secs}`;

            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                display.innerText = "00:00";
                status.innerText = "💪 휴식 끝! 다음 세트 폭격하십시오! 💪";
                status.style.color = "#4caf50";
                if (navigator.vibrate) navigator.vibrate([500, 200, 500]);
            }
        }, 1000);
    }
</script>
</body>
</html>
