<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강철 오운완 시스템 v5.0</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #4caf50;
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
            --danger-color: #e57373;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 480px;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            color: var(--accent-color);
            margin: 0;
            font-size: 22px;
        }

        /* ⏱️ 타이머 스타일 */
        .timer-card {
            background-color: var(--card-bg);
            border: 2px solid var(--accent-color);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            margin-bottom: 20px;
            position: sticky;
            top: 10px;
            z-index: 10;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .timer-display {
            font-size: 2.5rem;
            font-weight: bold;
            margin: 5px 0;
            font-variant-numeric: tabular-nums;
        }

        /* 📅 달력 섹션 스타일 */
        .calendar-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            text-align: center;
        }

        .calendar-day-label {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: bold;
            padding-bottom: 5px;
        }

        .calendar-day {
            background: #252525;
            padding: 8px 0;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            border: 1px solid transparent;
            position: relative;
        }

        .calendar-day.selected {
            border: 1px solid var(--accent-color);
            background: #1b3a1b;
        }

        .calendar-day.has-log::after {
            content: '';
            position: absolute;
            bottom: 3px;
            left: 50%;
            transform: translateX(-50%);
            width: 5px;
            height: 5px;
            background-color: var(--accent-color);
            border-radius: 50%;
        }

        /* ➕ 운동 추가 카드 */
        .add-workout-card {
            background-color: #252525;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px dashed var(--accent-color);
        }

        .add-input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            background: #121212;
            border: 1px solid #444;
            color: white;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .add-btn {
            width: 100%;
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        /* 🔄 루틴 탭 스타일 */
        .routine-tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
        }

        .tab-btn {
            flex: 1;
            background-color: #252525;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        .tab-btn.active {
            background-color: var(--accent-color);
        }

        /* 🏋️‍♂️ 운동 카드 스타일 */
        .workout-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .workout-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .workout-title {
            font-size: 16px;
            font-weight: bold;
            max-width: 60%;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .rest-input-box {
            background: #333;
            padding: 2px 6px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 3px;
            font-size: 11px;
        }

        .rest-edit-input {
            width: 35px;
            background: #121212;
            border: 1px solid #555;
            color: var(--accent-color);
            text-align: center;
            border-radius: 4px;
            font-weight: bold;
        }

        .delete-btn {
            background: none;
            border: none;
            color: var(--danger-color);
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
        }

        /* 🔢 입력 조절 UI */
        .input-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .control-label {
            width: 50px;
            font-weight: bold;
            color: var(--text-muted);
        }

        .counter-btn {
            background-color: #333;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .value-display {
            font-size: 18px;
            font-weight: bold;
            width: 80px;
            text-align: center;
        }

        .bodyweight-display {
            font-size: 18px;
            font-weight: bold;
            width: 170px;
            text-align: center;
            color: var(--accent-color);
            background: #151515;
            padding: 8px 0;
            border-radius: 8px;
        }

        .log-btn {
            width: 100%;
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        /* 📋 기록 확인 창 */
        .history-section {
            background-color: #1a1a1a;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid #333;
        }

        .log-entry {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #252525;
            font-size: 14px;
            cursor: pointer;
            border-radius: 6px;
            transition: background 0.2s;
        }

        .log-entry:active {
            background: #2a1a1a; /* 터치 시 붉은 빛으로 피드백 */
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>⚡ 강철 오운완 시스템 v5.0</h1>
        <p style="color: var(--text-muted); margin: 5px 0 0 0;">터치하여 오기입 세트 삭제</p>
    </header>

    <div class="timer-card">
        <div class="timer-display" id="timerDisplay">00:00</div>
        <div style="color: var(--accent-color); font-size: 12px; font-weight: bold;" id="timerStatus">대기 중</div>
    </div>

    <div class="calendar-card">
        <div class="calendar-header">
            <span id="calendarMonthYear"></span>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <div class="history-section">
        <div style="font-weight: bold; color: var(--accent-color); margin-bottom: 5px;" id="historyTitle">오늘의 기록</div>
        <div style="font-size: 11px; color: var(--danger-color); margin-bottom: 10px;">⚠️ 잘못 기록된 세트는 터치하면 삭제할 수 있습니다.</div>
        <div id="historyContent" style="color: var(--text-muted); font-size: 14px;">선택한 날짜에 기록된 운동이 없습니다.</div>
    </div>

    <div class="routine-tabs">
        <button class="tab-btn active" onclick="switchRoutine('push', this)">1일차: PUSH</button>
        <button class="tab-btn" onclick="switchRoutine('pull', this)">2일차: PULL</button>
        <button class="tab-btn" onclick="switchRoutine('leg', this)">3일차: LEG/코어</button>
    </div>

    <div class="add-workout-card">
        <div style="font-weight: bold; margin-bottom: 10px; color: var(--accent-color);" id="addTitle">현재 탭에 운동 추가</div>
        <input type="text" id="newWorkoutName" class="add-input" placeholder="예: 벤치프레스, 턱걸이, 크런치">
        <input type="number" id="newWorkoutRest" class="add-input" placeholder="휴식 시간 (초 단위, 예: 60, 120)" value="60">
        <div class="checkbox-group">
            <input type="checkbox" id="isBodyweight">
            <label for="isBodyweight">⚠️ 무게 없는 맨몸 운동 (턱걸이, 크런치 등)</label>
        </div>
        <button class="add-btn" onclick="addNewWorkout()">선택된 루틴에 추가</button>
    </div>

    <div id="workoutContainer"></div>
</div>

<script>
    let timerInterval = null;
    let currentRoutine = 'push';
    
    let database = JSON.parse(localStorage.getItem('workout_db')) || {};
    
    const defaultRoutine = {
        push: [
            { id: 'p1', name: '2. 벤치프레스 (Bench Press)', weight: 60, reps: 7, rest: 180, weightUnit: 5, isBodyweight: false },
            { id: 'p2', name: '5. 밀리터리 프레스 (OHP)', weight: 40, reps: 6, rest: 120, weightUnit: 5, isBodyweight: false },
            { id: 'p3', name: '4. 인클라인 덤벨 프레스', weight: 15, reps: 15, rest: 120, weightUnit: 1, isBodyweight: false },
            { id: 'p4', name: '6. 사이드 레터럴 레이즈', weight: 4, reps: 20, rest: 60, weightUnit: 1, isBodyweight: false },
            { id: 'p5', name: '7. 덤벨 펙덱플라이', weight: 8, reps: 15, rest: 60, weightUnit: 1, isBodyweight: false }
        ],
        pull: [
            { id: 'l1', name: '3. 데드리프트 (Deadlift)', weight: 120, reps: 5, rest: 240, weightUnit: 5, isBodyweight: false },
            { id: 'l2', name: '8. 턱걸이 (Pull-ups)', weight: 0, reps: 5, rest: 120, weightUnit: 1, isBodyweight: true },
            { id: 'l3', name: '9. 바벨 로우', weight: 50, reps: 8, rest: 120, weightUnit: 5, isBodyweight: false }
        ],
        leg: [
            { id: 'g1', name: '1. 백 스쿼트 (Back Squat)', weight: 90, reps: 5, rest: 240, weightUnit: 5, isBodyweight: false },
            { id: 'g2', name: '12. 런지 (Lunge)', weight: 0, reps: 12, rest: 90, weightUnit: 1, isBodyweight: false },
            { id: 'g3', name: '10. 행잉 레그레이즈', weight: 0, reps: 15, rest: 60, weightUnit: 1, isBodyweight: true },
            { id: 'g4', name: '11. 크런치', weight: 0, reps: 20, rest: 60, weightUnit: 1, isBodyweight: true }
        ]
    };
    
    let routineData = JSON.parse(localStorage.getItem('routine_db')) || defaultRoutine;

    const todayStr = getFormattedDate(new Date());
    let selectedDateStr = todayStr;

    initCalendar();
    renderWorkouts();
    updateAddTitle();
    showHistoryAt(todayStr);

    function getFormattedDate(date) {
        const yyyy = date.getFullYear();
        const mm = String(date.getMonth() + 1).padStart(2, '0');
        const dd = String(date.getDate()).padStart(2, '0');
        return `${yyyy}-${mm}-${dd}`;
    }

    function initCalendar() {
        const now = new Date();
        document.getElementById('calendarMonthYear').innerText = `${now.getFullYear()}년 ${now.getMonth() + 1}월`;
        
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';

        const days = ['일', '월', '화', '수', '목', '금', '토'];
        days.forEach(d => {
            const label = document.createElement('div');
            label.className = 'calendar-day-label';
            label.innerText = d;
            grid.appendChild(label);
        });

        const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
        const endOfMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0);
        
        for(let i=0; i<startOfMonth.getDay(); i++) {
            grid.appendChild(document.createElement('div'));
        }

        for(let d=1; d<=endOfMonth.getDate(); d++) {
            const dayBox = document.createElement('div');
            dayBox.className = 'calendar-day';
            dayBox.innerText = d;
            
            const targetDateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            
            if (database[targetDateStr] && database[targetDateStr].length > 0) {
                dayBox.classList.add('has-log');
            }

            if (targetDateStr === selectedDateStr) {
                dayBox.classList.add('selected');
            }

            dayBox.onclick = () => {
                document.querySelectorAll('.calendar-day').forEach(el => el.classList.remove('selected'));
                dayBox.classList.add('selected');
                selectedDateStr = targetDateStr;
                showHistoryAt(targetDateStr);
            };

            grid.appendChild(dayBox);
        }
    }

    function switchRoutine(routineType, btnElement) {
        currentRoutine = routineType;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btnElement.classList.add('active');
        updateAddTitle();
        renderWorkouts();
    }

    function updateAddTitle() {
        const titles = { push: '1일차: PUSH', pull: '2일차: PULL', leg: '3일차: LEG/코어' };
        document.getElementById('addTitle').innerText = `＋ [${titles[currentRoutine]}] 루틴에 운동 추가`;
    }

    function addNewWorkout() {
        const nameInput = document.getElementById('newWorkoutName');
        const restInput = document.getElementById('newWorkoutRest');
        const isBodyweightCheck = document.getElementById('isBodyweight');
        
        if (!nameInput.value.trim()) {
            alert('운동 이름을 입력하십시오!');
            return;
        }

        const name = nameInput.value.trim();
        const isHeavy = name.includes('벤치') || name.includes('스쿼트') || name.includes('데드') || name.includes('로우') || name.includes('프레스');
        const newId = 'custom_' + Date.now();
        
        routineData[currentRoutine].push({
            id: newId,
            name: name,
            weight: isBodyweightCheck.checked ? 0 : (isHeavy ? 40 : 10),
            reps: 10,
            rest: parseInt(restInput.value) || 60,
            weightUnit: isHeavy ? 5 : 1,
            isBodyweight: isBodyweightCheck.checked
        });

        localStorage.setItem('routine_db', JSON.stringify(routineData));
        nameInput.value = '';
        isBodyweightCheck.checked = false;
        renderWorkouts();
    }

    function deleteWorkout(id) {
        if(confirm("이 운동 종목을 현재 루틴에서 완전히 빼시겠습니까?")) {
            routineData[currentRoutine] = routineData[currentRoutine].filter(w => w.id !== id);
            localStorage.setItem('routine_db', JSON.stringify(routineData));
            renderWorkouts();
        }
    }

    function renderWorkouts() {
        const container = document.getElementById('workoutContainer');
        container.innerHTML = '';

        if(routineData[currentRoutine].length === 0) {
            container.innerHTML = `<div style="text-align:center; padding: 20px; color: var(--text-muted); font-size:14px;">루틴이 비어있습니다. 위에서 운동을 추가하십시오!</div>`;
            return;
        }

        routineData[currentRoutine].forEach(w => {
            const card = document.createElement('div');
            card.className = 'workout-card';

            let weightSection = '';
            if (w.isBodyweight) {
                weightSection = `
                    <div class="input-group">
                        <div class="control-label">무게</div>
                        <div class="bodyweight-display">💪 맨몸 (자체 체중)</div>
                    </div>
                `;
            } else {
                weightSection = `
                    <div class="input-group">
                        <div class="control-label">무게</div>
                        <button class="counter-btn" onclick="adjustValue('${w.id}', 'weight', -${w.weightUnit})">-${w.weightUnit}</button>
                        <div class="value-display" id="${w.id}-weight">${w.weight} kg</div>
                        <button class="counter-btn" onclick="adjustValue('${w.id}', 'weight', ${w.weightUnit})">+${w.weightUnit}</button>
                    </div>
                `;
            }

            card.innerHTML = `
                <div class="workout-header">
                    <div class="workout-title">${w.name}</div>
                    <div class="header-controls">
                        <div class="rest-input-box">
                            <span>휴식:</span>
                            <input type="number" class="rest-edit-input" value="${w.rest}" onchange="updateRestTime('${w.id}', this.value)">
                            <span>초</span>
                        </div>
                        <button class="delete-btn" onclick="deleteWorkout('${w.id}')">제거</button>
                    </div>
                </div>
                
                ${weightSection}

                <div class="input-group">
                    <div class="control-label">횟수</div>
                    <button class="counter-btn" onclick="adjustValue('${w.id}', 'reps', -1)">-1</button>
                    <div class="value-display" id="${w.id}-reps">${w.reps} 회</div>
                    <button class="counter-btn" onclick="adjustValue('${w.id}', 'reps', 1)">+1</button>
                </div>

                <button class="log-btn" onclick="logSet('${w.id}', '${w.name}')">세트 완료</button>
            `;
            container.appendChild(card);
        });
    }

    function updateRestTime(id, newSeconds) {
        const item = routineData[currentRoutine].find(w => w.id === id);
        item.rest = parseInt(newSeconds) || 0;
        localStorage.setItem('routine_db', JSON.stringify(routineData));
    }

    function adjustValue(id, key, amount) {
        const item = routineData[currentRoutine].find(w => w.id === id);
        item[key] += amount;
        if(item[key] < 0) item[key] = 0;
        document.getElementById(`${id}-${key}`).innerText = item[key] + (key === 'weight' ? ' kg' : ' 회');
        localStorage.setItem('routine_db', JSON.stringify(routineData));
    }

    function logSet(id, name) {
        const item = routineData[currentRoutine].find(w => w.id === id);
        
        if (!database[selectedDateStr]) {
            database[selectedDateStr] = [];
        }

        const weightText = item.isBodyweight ? '맨몸' : `${item.weight}kg`;

        database[selectedDateStr].push({
            name: name,
            weightDisplay: weightText,
            reps: item.reps,
            time: new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' })
        });

        localStorage.setItem('workout_db', JSON.stringify(database));
        
        initCalendar();
        showHistoryAt(selectedDateStr);
        startTimer(item.rest);
    }

    // 📋 기록 화면 출력 및 터치 삭제 바인딩
    function showHistoryAt(dateStr) {
        document.getElementById('historyTitle').innerText = `📅 ${dateStr}의 기록`;
        const content = document.getElementById('historyContent');
        content.innerHTML = '';

        if (!database[dateStr] || database[dateStr].length === 0) {
            content.innerText = '이 날 기록된 운동이 없습니다. 바벨을 드십시오!';
            return;
        }

        database[dateStr].forEach((log, idx) => {
            const row = document.createElement('div');
            row.className = 'log-entry';
            row.innerHTML = `
                <span>${log.name}</span>
                <span style="color:var(--accent-color); font-weight:bold;">${log.weightDisplay} x ${log.reps}회 <small style="color:#666; font-weight:normal;">(${log.time})</small></span>
            `;
            
            // ❌ 개별 기록 터치 시 삭제 연동
            row.onclick = () => {
                if (confirm(`"${log.name} (${log.weightDisplay} x ${log.reps}회)" 기록을 지우시겠습니까?`)) {
                    removeLogEntry(dateStr, idx);
                }
            };

            content.appendChild(row);
        });
    }

    // ❌ 데이터베이스에서 개별 세트 삭제 처리 함수
    function removeLogEntry(dateStr, index) {
        if (database[dateStr]) {
            database[dateStr].splice(index, 1); // 배열에서 해당 기록 삭제
            
            // 만약 그날 모든 기록이 지워졌다면 해당 날짜 키 자체를 삭제
            if (database[dateStr].length === 0) {
                delete database[dateStr];
            }
            
            // 로컬 스토리지에 최종 반영
            localStorage.setItem('workout_db', JSON.stringify(database));
            
            // 형님이 생각하신 대로 달력과 하단 기록 레이아웃을 동시 새로고침!
            initCalendar();
            showHistoryAt(dateStr);
        }
    }

    function startTimer(seconds) {
        clearInterval(timerInterval);
        let timeLeft = seconds;
        const display = document.getElementById('timerDisplay');
        const status = document.getElementById('timerStatus');
        
        status.innerText = "🔥 근육 회복 중... 강해지는 시간! 🔥";
        status.style.color = "#ff9800";

        timerInterval = setInterval(() => {
            timeLeft--;
            const mins = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const secs = (timeLeft % 60).toString().padStart(2, '0');
            display.innerText = `${mins}:${secs}`;

            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                display.innerText = "00:00";
                status.innerText = "💪 휴식 끝! 다음 세트 폭격하십시오! 💪";
                status.style.color = "#4caf50";
                if (navigator.vibrate) navigator.vibrate([500, 200, 500]);
            }
        }, 1000);
    }
</script>
</body>
</html>
